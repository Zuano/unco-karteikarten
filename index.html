    box-shadow:0 2px 4px rgba(0,0,0,.15);border:2px solid #fff}

/* ============================================================
   APP-LOGIK
   ============================================================ */
let state = {
  topic: TOPICS[0].id,
  mode: "fill",            // "fill" | "drop"
  cardIdx: 0,
  score: 0,
  total: 0,
  answered: false,
  selectedGewinn: null,    // "erhoehend" | "vermindernd" | "neutral" | null
  subset: null,            // im Review-Modus: Array von Indizes; sonst null
  wrongByDeck: {},         // { "topic_mode": Set<cardIdx> } — falsch beantwortete Karten
  correctByDeck: {}        // { "topic_mode": Set<cardIdx> } — richtig beantwortete Karten
};

function deck(){ return EXERCISES[state.topic][state.mode]; }
function deckKey(){ return state.topic + "_" + state.mode; }
function deckKeyFor(topic, mode){ return topic + "_" + mode; }
function wrongSet(){
  if(!state.wrongByDeck[deckKey()]) state.wrongByDeck[deckKey()] = new Set();
  return state.wrongByDeck[deckKey()];
}
function correctSet(){
  if(!state.correctByDeck[deckKey()]) state.correctByDeck[deckKey()] = new Set();
  return state.correctByDeck[deckKey()];
}
function wrongCountFor(topic, mode){
  const s = state.wrongByDeck[deckKeyFor(topic, mode)];
  return s ? s.size : 0;
}
function correctCountFor(topic, mode){
  const s = state.correctByDeck[deckKeyFor(topic, mode)];
  return s ? s.size : 0;
}
function topicWrongCount(topic){
  return wrongCountFor(topic, "fill") + wrongCountFor(topic, "drop");
}
function modeDone(topic, mode){
  return correctCountFor(topic, mode) === EXERCISES[topic][mode].length;
}
function topicDone(topic){
  return modeDone(topic, "fill") && modeDone(topic, "drop");
}
function totalCards(){ return state.subset ? state.subset.length : deck().length; }
function currentDeckIdx(){ return state.subset ? state.subset[state.cardIdx] : state.cardIdx; }
function currentCard(){ return deck()[currentDeckIdx()]; }

const fmt = n => {
  // 1.000,00 oder 4,90 etc.
  return n.toLocaleString("de-AT",{minimumFractionDigits:2,maximumFractionDigits:2});
};
const num = (s) => {
  if(s===null||s===undefined) return NaN;
  const cleaned = String(s).replace(/\./g,"").replace(",",".").replace(/[^\d.\-]/g,"");
  return parseFloat(cleaned);
};

function buildTopicBar(){
  const bar = document.getElementById("topicBar");
  bar.innerHTML = "";
  TOPICS.forEach(t=>{
    const b = document.createElement("button");
    b.className = "topic-btn"+(t.id===state.topic?" active":"");
    b.dataset.topic = t.id;
    b.innerHTML = `<span class="topic-label">${t.label}</span>`;
    b.onclick = ()=>{
      if(state.topic === t.id) return;
      state.topic = t.id;
      bar.querySelectorAll(".topic-btn").forEach(x=>x.classList.remove("active"));
      b.classList.add("active");
      resetDeck();
      render();
      updateAllBadges();
    };
    bar.appendChild(b);
  });
  updateAllBadges();
}

function setMode(m){
  if(state.mode===m) return;
  state.mode = m;
  document.getElementById("modeFill").classList.toggle("active",m==="fill");
  document.getElementById("modeDrop").classList.toggle("active",m==="drop");
  resetDeck();
  render();
  updateAllBadges();
}

function setBadge(el, wrongCount, done){
  let badge = el.querySelector(".badge");
  if(wrongCount > 0){
    // rote Badge — hat Vorrang
    if(!badge){ badge = document.createElement("span"); el.appendChild(badge); }
    badge.className = "badge";
    badge.textContent = wrongCount;
    badge.title = wrongCount + " falsche Karte" + (wrongCount===1?"":"n") + " offen";
  } else if(done){
    // grünes Häkchen — Topic/Modus zu 100% gelöst
    if(!badge){ badge = document.createElement("span"); el.appendChild(badge); }
    badge.className = "badge done";
    badge.textContent = "✓";
    badge.title = "Alle Karten richtig gelöst";
  } else if(badge){
    badge.remove();
  }
}
function updateAllBadges(){
  // Topic-Buttons: rote Zahl (Summe falscher beider Modi) ODER grüner Haken wenn topicDone
  document.querySelectorAll("#topicBar .topic-btn").forEach(b=>{
    const tid = b.dataset.topic;
    setBadge(b, topicWrongCount(tid), topicDone(tid));
  });
  // Mode-Buttons: rote Zahl ODER grüner Haken wenn der jeweilige Modus done ist
  setBadge(document.getElementById("modeFill"),
           wrongCountFor(state.topic, "fill"), modeDone(state.topic, "fill"));
  setBadge(document.getElementById("modeDrop"),
           wrongCountFor(state.topic, "drop"), modeDone(state.topic, "drop"));
}

function resetDeck(){ state.cardIdx=0; state.score=0; state.total=0; state.answered=false; state.selectedGewinn=null; state.subset=null; }

function startReview(){
  const wrongs = Array.from(wrongSet()).sort((a,b)=>a-b);
  if(!wrongs.length){ render(); return; }
  state.subset = wrongs;
  state.cardIdx = 0;
  state.score = 0;
  state.total = 0;
  state.answered = false;
  state.selectedGewinn = null;
  render();
  updateAllBadges();
}
function exitReview(){
  state.subset = null;
  state.cardIdx = 0;
  state.score = 0;
  state.total = 0;
  state.answered = false;
  state.selectedGewinn = null;
  render();
}

function buildSelect(name, value){
  // dropdown mit allen Konten
  const opts = Object.entries(KONTEN).map(([k,v])=>`<option value="${k}">${v}</option>`).join("");
  return `<select class="field" data-name="${name}"><option value="">— Konto wählen —</option>${opts}</select>`;
}

function render(){
  const area = document.getElementById("cardArea");
  const total = totalCards();
  const idx = state.cardIdx;
  const inReview = !!state.subset;

  // wichtig: bei jedem neuen Render eine "frische" Karte → state zurücksetzen
  state.answered = false;
  state.selectedGewinn = null;

  // progress
  const reviewLabel = inReview ? " (Wiederholung)" : "";
  document.getElementById("progressText").textContent = `Karte ${Math.min(idx+1,total)} / ${total}${reviewLabel}`;
  document.getElementById("scoreText").textContent = `Punkte: ${state.score} / ${state.total}`;
  document.getElementById("progressFill").style.width = `${((idx)/total)*100}%`;

  // Übung abgeschlossen?
  if(idx>=total){
    const remainingWrong = wrongSet().size;
    const heading = inReview ? "Wiederholung abgeschlossen ✅" : "Übung abgeschlossen 🎉";
    let message;
    if(state.score===state.total && state.total>0){
      message = inReview
        ? "Super — alle Wiederholungs-Karten jetzt richtig gelöst!"
        : "Perfekt! Alle Buchungssätze richtig.";
      if(topicDone(state.topic)){
        const topicLabel = TOPICS.find(t=>t.id===state.topic).label;
        message += ` ✅ Du hast jetzt das gesamte Thema „${topicLabel}" zu 100 % gelöst!`;
      }
    } else if(state.score>=state.total*0.7){
      message = "Gut gemacht — fast alles richtig.";
    } else {
      message = "Noch ein bisschen üben — du schaffst das!";
    }
    let actions = "";
    if(remainingWrong > 0){
      actions += `<button class="btn btn-primary" onclick="startReview()">🎯 Nur falsche Karten wiederholen (${remainingWrong})</button>`;
    }
    if(inReview){
      actions += `<button class="btn btn-secondary" onclick="exitReview()">↩︎ Zurück zu allen ${deck().length} Karten</button>`;
    } else {
      actions += `<button class="btn btn-secondary" onclick="resetDeck();render()">🔁 Übung nochmal starten (alle ${deck().length})</button>`;
    }
    area.innerHTML = `<div class="card summary">
      <h2>${heading}</h2>
      <div class="score">${state.score} / ${state.total}</div>
      <p>${message}</p>
      <div class="actions">${actions}</div>
    </div>`;
    document.getElementById("progressFill").style.width="100%";
    updateAllBadges();
    return;
  }

  const card = currentCard();
  const lines = card.lines;

  // Soll/Haben Spalten aufbauen mit globalen Indizes (für späteres checken)
  const buildRow = (l, i) => {
    const kontoCell = state.mode==="drop"
      ? buildSelect(`konto_${i}`, "")
      : `<div class="konto-wrap">
           <input class="field" type="text" data-name="konto_${i}" placeholder="z.B. 5000" autocomplete="off" inputmode="numeric">
           <div class="konto-hint" data-hint="${i}">&nbsp;</div>
         </div>`;
    const betragCell = `<input class="field betrag-input" type="text" inputmode="decimal" data-name="betrag_${i}" placeholder="0,00" autocomplete="off">`;
    return `<div class="booking-row">${kontoCell}${betragCell}</div>`;
  };

  const sollRows  = lines.map((l,i)=>l.side==="Soll"  ? buildRow(l,i) : null).filter(Boolean).join("")
                  || `<div class="booking-row empty">— keine Buchung im Soll —</div>`;
  const habenRows = lines.map((l,i)=>l.side==="Haben" ? buildRow(l,i) : null).filter(Boolean).join("")
                  || `<div class="booking-row empty">— keine Buchung im Haben —</div>`;

  // Banner: offene Karten aus früherem Versuch
  const wrongs = wrongSet().size;
  const banner = (!inReview && wrongs > 0 && idx === 0)
    ? `<div class="review-banner">
         <span>📝 Du hast in dieser Übung noch <b>${wrongs}</b> Karte${wrongs===1?'':'n'} aus dem letzten Versuch offen.</span>
         <button class="btn btn-primary" onclick="startReview()">🎯 Nur diese ${wrongs} wiederholen</button>
       </div>`
    : "";

  area.innerHTML = `
    ${banner}
    <div class="card">
      <h2>${TOPICS.find(t=>t.id===state.topic).label} — ${state.mode==="fill"?"Selbst ausfüllen":"Multiple Choice"}${inReview?" · Wiederholung":""}</h2>
      <div class="scenario">${card.scenario}</div>
      <div class="booking-grid">
        <div class="booking-side soll">
          <h4>Soll</h4>
          ${sollRows}
        </div>
        <div class="booking-side haben">
          <h4>Haben</h4>
          ${habenRows}
        </div>
        <div class="booking-side gewinn">
          <h4>Gewinn?</h4>
          <div class="gewinn-options">
            <button class="gewinn-btn gewinn-erh" data-gewinn="erhoehend"><span class="gewinn-symbol">↑</span>erhöhend</button>
            <button class="gewinn-btn gewinn-ver" data-gewinn="vermindernd"><span class="gewinn-symbol">↓</span>vermindernd</button>
            <button class="gewinn-btn gewinn-neu" data-gewinn="neutral"><span class="gewinn-symbol">(0)</span>neutral</button>
          </div>
        </div>
      </div>
      <p class="hint">${state.mode==="fill"
        ? "Soll-Konten links, Haben-Konten rechts, Gewinnauswirkung rechts auswählen. Kontonummer (z.B. <b>5000</b>) und Betrag eintragen — Komma oder Punkt funktionieren beide."
        : "Soll-Konten links, Haben-Konten rechts, Gewinnauswirkung rechts auswählen."
      }</p>
      <div class="actions">
        <button class="btn btn-primary" id="btnCheck">✓ Prüfen</button>
        <button class="btn btn-secondary" id="btnSkip" title="Lösung anzeigen ohne zu prüfen">💡 Lösung anzeigen</button>
      </div>
      <div class="feedback" id="feedback"></div>
      <div id="solutionSlot"></div>
    </div>
  `;

  document.getElementById("btnCheck").onclick = checkCard;
  document.getElementById("btnSkip").onclick  = revealSolution;

  // Gewinn-Buttons: Auswahl
  document.querySelectorAll(".gewinn-btn").forEach(b=>{
    b.onclick = ()=>{
      if(state.answered) return;
      state.selectedGewinn = b.dataset.gewinn;
      document.querySelectorAll(".gewinn-btn").forEach(x=>x.classList.remove("selected"));
      b.classList.add("selected");
    };
  });

  // Live-Konto-Lookup beim Tippen (nur Fill-Modus)
  if(state.mode === "fill"){
    document.querySelectorAll('input[data-name^="konto_"]').forEach(inp=>{
      const i = inp.dataset.name.split('_')[1];
      const hint = document.querySelector(`[data-hint="${i}"]`);
      if(!hint) return;
      const update = ()=>{
        const v = inp.value.trim();
        if(!v){ hint.innerHTML = "&nbsp;"; hint.className = "konto-hint"; return; }
        if(KONTEN[v] && v !== "—"){
          hint.textContent = KONTEN[v];
          hint.className = "konto-hint match";
        } else if(v.length >= 4){
          hint.textContent = "Kontonummer nicht im Plan";
          hint.className = "konto-hint unknown";
        } else {
          hint.innerHTML = "&nbsp;";
          hint.className = "konto-hint";
        }
      };
      inp.addEventListener('input', update);
    });
  }
}

function getInputs(){
  return Array.from(document.querySelectorAll('#cardArea .field'));
}

function checkCard(){
  if(state.answered) return;
  const card = currentCard();
  const inputs = getInputs();
  let allCorrect = true;
  card.lines.forEach((l,i)=>{
    const kontoEl  = document.querySelector(`[data-name="konto_${i}"]`);
    const betragEl = document.querySelector(`[data-name="betrag_${i}"]`);
    const kontoOK  = (kontoEl.value||"").trim() === l.konto;
    const betragOK = Math.abs((num(betragEl.value)||-1) - l.betrag) < 0.005;
    kontoEl.classList.toggle("correct",kontoOK);
    kontoEl.classList.toggle("wrong",!kontoOK);
    betragEl.classList.toggle("correct",betragOK);
    betragEl.classList.toggle("wrong",!betragOK);
    if(!kontoOK || !betragOK) allCorrect = false;
  });

  // Gewinn-Auswirkung prüfen
  const gewinnOK = state.selectedGewinn === card.gewinn;
  const gewinnMissing = state.selectedGewinn === null;
  document.querySelectorAll(".gewinn-btn").forEach(b=>{
    b.classList.remove("correct","wrong");
    if(gewinnMissing){
      // User hat nichts gewählt → alle Buttons rot markieren, damit klar ist:
      // hier wurde eine Auswahl vergessen (statt der korrekten als "richtig" zu zeigen)
      b.classList.add("wrong");
    } else if(b.dataset.gewinn === card.gewinn){
      b.classList.add("correct");
    } else if(b.dataset.gewinn === state.selectedGewinn){
      b.classList.add("wrong");
    }
  });
  if(!gewinnOK) allCorrect = false;

  // Karten-Tracking: zwei persistente Sets pro Deck
  const cardIdx = currentDeckIdx();
  if(allCorrect){
    wrongSet().delete(cardIdx);
    correctSet().add(cardIdx);
  } else {
    wrongSet().add(cardIdx);
    correctSet().delete(cardIdx);
  }
  updateAllBadges();

  state.total += 1;
  if(allCorrect) state.score += 1;
  state.answered = true;

  const fb = document.getElementById("feedback");
  fb.classList.add("show");
  if(allCorrect){
    fb.classList.add("good"); fb.classList.remove("bad");
    fb.innerHTML = "✅ <b>Richtig gebucht!</b> " + (card.explanation || "");
  }else{
    fb.classList.add("bad"); fb.classList.remove("good");
    let msg = "❌ <b>Noch nicht ganz.</b>";
    if(gewinnMissing){
      msg += " ⚠️ <b>Gewinnauswirkung wurde nicht ausgewählt</b> — denk beim nächsten Mal an die Auswahl rechts!";
    }
    msg += " Schau dir die Lösung unten als Karteikarte an.";
    fb.innerHTML = msg;
    showSolutionCard();
  }

  // Buttons umschalten
  const a = document.querySelector(".actions");
  a.innerHTML = `<button class="btn btn-primary" id="btnNext">→ Nächste Karte</button>
                 <button class="btn btn-secondary" id="btnRetry">🔄 Diese Karte wiederholen</button>`;
  document.getElementById("btnNext").onclick = ()=>{ state.cardIdx++; render(); };
  document.getElementById("btnRetry").onclick = ()=>{ state.answered=false; state.total-=1; if(allCorrect) state.score-=1; render(); };

  // progress score live
  document.getElementById("scoreText").textContent = `Punkte: ${state.score} / ${state.total}`;
}

function showSolutionCard(){
  const card = currentCard();
  const slot = document.getElementById("solutionSlot");
  const rowFor = side => {
    const items = card.lines.filter(l=>l.side===side);
    if(!items.length) return `<div class="sol-empty">— —</div>`;
    return items.map(l=>`
      <div class="sol-row-2">
        <span class="sol-konto">${KONTEN[l.konto]||l.konto}</span>
        <span class="sol-betrag">€ ${fmt(l.betrag)}</span>
      </div>`).join("");
  };
  const g = GEWINN_LABELS[card.gewinn] || GEWINN_LABELS.neutral;
  slot.innerHTML = `<div class="solution-card">
    <h3>📇 Lösungs-Karteikarte</h3>
    <div class="sol-grid">
      <div class="sol-side"><h4>Soll</h4>${rowFor("Soll")}</div>
      <div class="sol-side"><h4>Haben</h4>${rowFor("Haben")}</div>
      <div class="sol-side"><h4>Gewinn?</h4>
        <div class="sol-gewinn" style="color:${g.color}">
          <span class="gewinn-symbol">${g.symbol}</span>${g.label}
        </div>
      </div>
    </div>
    ${card.explanation?`<div class="explanation">💡 ${card.explanation}</div>`:""}
  </div>`;
}

function revealSolution(){
  if(state.answered) return;
  // Ohne Wertung: nur Lösung zeigen
  state.answered = true;
  state.total += 1; // gilt als beantwortet, aber kein Punkt
  // Diese Karte zählt als "noch nicht 100% richtig" → ins wrongSet, aus correctSet
  const ci = currentDeckIdx();
  wrongSet().add(ci);
  correctSet().delete(ci);
  updateAllBadges();
  showSolutionCard();
  const fb = document.getElementById("feedback");
  fb.classList.add("show","bad");
  fb.innerHTML = "💡 Lösung angezeigt (kein Punkt, weil ohne Versuch).";
  const a = document.querySelector(".actions");
  a.innerHTML = `<button class="btn btn-primary" id="btnNext">→ Nächste Karte</button>`;
  document.getElementById("btnNext").onclick = ()=>{ state.cardIdx++; render(); };
  document.getElementById("scoreText").textContent = `Punkte: ${state.score} / ${state.total}`;
}

/* Init */
document.getElementById("modeFill").onclick = ()=>setMode("fill");
document.getElementById("modeDrop").onclick = ()=>setMode("drop");
buildTopicBar();
render();

// Footer aus zentraler BUILD-Konstante füllen
document.getElementById("footer").innerHTML =
  `UNCO Karteikarten · 2. SBO 30.04.2026 · <code>${BUILD.version}</code> · Stand: ${BUILD.timestamp}`;
</script>
</body>
